openapi: 3.0.3
info:
  title: Craken Spaces Public Control-Plane API
  version: v1
  description: |
    Narrow external HTTP API used by the `spaces` CLI for user and
    space-admin flows.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /api/v1/apply:
    post:
      operationId: apply
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyRequest'
      responses:
        '200':
          $ref: '#/components/responses/OkResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/login:
    post:
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/recover:
    post:
      operationId: authRecover
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRecoverRequest'
      responses:
        '200':
          description: Recovery code requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRecoverResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/recover/redeem:
    post:
      operationId: authRecoverRedeem
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRecoverRedeemRequest'
      responses:
        '200':
          description: Recovered session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      responses:
        '200':
          $ref: '#/components/responses/OkResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/whoami:
    get:
      operationId: whoAmI
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/spaces:
    get:
      operationId: listSpaces
      responses:
        '200':
          description: Space list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpacesResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: createSpace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpaceRequest'
      responses:
        '200':
          description: Created space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/spaces/{spaceId}/up:
    post:
      operationId: startSpace
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          description: Started space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/spaces/{spaceId}/down:
    post:
      operationId: stopSpace
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          description: Stopped space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/spaces/{spaceId}/delete:
    delete:
      operationId: deleteSpace
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      responses:
        '200':
          $ref: '#/components/responses/OkResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/ssh/keys:
    get:
      operationId: listSSHKeys
      responses:
        '200':
          description: Registered SSH public keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKeysResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      operationId: addSSHKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSSHKeyRequest'
      responses:
        '200':
          description: Registered SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKeyResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/ssh/keys/{fingerprint}:
    delete:
      operationId: removeSSHKey
      parameters:
        - $ref: '#/components/parameters/Fingerprint'
      responses:
        '200':
          $ref: '#/components/responses/OkResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/ssh/issue-cert:
    post:
      operationId: issueSSHCert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueSSHCertRequest'
      responses:
        '200':
          description: Short-lived SSH certificate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueSSHCertResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/ssh/known-hosts:
    get:
      operationId: sshKnownHosts
      parameters:
        - $ref: '#/components/parameters/SSHKnownHostsHost'
        - $ref: '#/components/parameters/SSHKnownHostsPort'
      responses:
        '200':
          description: Pinned SSH host trust material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKnownHostsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  parameters:
    SpaceId:
      name: spaceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    Fingerprint:
      name: fingerprint
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    SSHKnownHostsHost:
      name: host
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    SSHKnownHostsPort:
      name: port
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 65535
  responses:
    OkResponse:
      description: Generic success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OkResponse'
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OkResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
    ApplyRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
        occupation:
          type: string
        use:
          type: string
    AuthLoginRequest:
      type: object
      additionalProperties: false
      required: [email, key]
      properties:
        email:
          type: string
          format: email
        key:
          type: string
          minLength: 1
    AuthRecoverRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    AuthRecoverResponse:
      type: object
      additionalProperties: false
      required: [ok, message]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
    AuthRecoverRedeemRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 1
    SessionResponse:
      type: object
      additionalProperties: false
      required: [ok, email, session_token]
      properties:
        ok:
          type: boolean
          enum: [true]
        email:
          type: string
          format: email
        session_token:
          type: string
          minLength: 1
    User:
      type: object
      additionalProperties: false
      required: [id, email, name]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
    UserResponse:
      type: object
      additionalProperties: false
      required: [ok, user]
      properties:
        ok:
          type: boolean
          enum: [true]
        user:
          $ref: '#/components/schemas/User'
    Space:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - role
        - owner_user_id
        - created_at
        - cpu_millis
        - memory_mib
        - disk_mb
        - network_egress_mb
        - llm_tokens_limit
        - llm_tokens_used
        - actor_cpu_millis
        - actor_memory_mib
        - actor_disk_mb
        - actor_network_mb
        - actor_llm_tokens
        - guardian_bytes_used
        - guardian_requests_per_hour
        - runtime_state
        - runtime_meta
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        owner_user_id:
          type: integer
          format: int64
        created_at:
          type: string
        cpu_millis:
          type: integer
        memory_mib:
          type: integer
        disk_mb:
          type: integer
        network_egress_mb:
          type: integer
        llm_tokens_limit:
          type: integer
        llm_tokens_used:
          type: integer
        actor_cpu_millis:
          type: integer
        actor_memory_mib:
          type: integer
        actor_disk_mb:
          type: integer
        actor_network_mb:
          type: integer
        actor_llm_tokens:
          type: integer
        guardian_bytes_used:
          type: integer
          format: int64
        guardian_requests_per_hour:
          type: integer
        runtime_state:
          type: string
        runtime_meta:
          type: string
    SpacesResponse:
      type: object
      additionalProperties: false
      required: [ok, spaces]
      properties:
        ok:
          type: boolean
          enum: [true]
        spaces:
          type: array
          items:
            $ref: '#/components/schemas/Space'
    SpaceResponse:
      type: object
      additionalProperties: false
      required: [ok, space]
      properties:
        ok:
          type: boolean
          enum: [true]
        space:
          $ref: '#/components/schemas/Space'
    CreateSpaceRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - cpu_millis
        - memory_mib
        - disk_mb
        - network_egress_mb
        - llm_tokens_limit
      properties:
        name:
          type: string
        cpu_millis:
          type: integer
        memory_mib:
          type: integer
        disk_mb:
          type: integer
        network_egress_mb:
          type: integer
        llm_tokens_limit:
          type: integer
    SSHKey:
      type: object
      additionalProperties: false
      required:
        - id
        - user_id
        - user_email
        - name
        - public_key
        - fingerprint
        - created_at
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        user_email:
          type: string
          format: email
        name:
          type: string
        public_key:
          type: string
        fingerprint:
          type: string
        created_at:
          type: string
    SSHKeysResponse:
      type: object
      additionalProperties: false
      required: [ok, keys]
      properties:
        ok:
          type: boolean
          enum: [true]
        keys:
          type: array
          items:
            $ref: '#/components/schemas/SSHKey'
    SSHKeyResponse:
      type: object
      additionalProperties: false
      required: [ok, key]
      properties:
        ok:
          type: boolean
          enum: [true]
        key:
          $ref: '#/components/schemas/SSHKey'
    AddSSHKeyRequest:
      type: object
      additionalProperties: false
      required: [name, public_key]
      properties:
        name:
          type: string
        public_key:
          type: string
    IssueSSHCertRequest:
      type: object
      additionalProperties: false
      required: [public_key, principal, cert_ttl]
      properties:
        public_key:
          type: string
        principal:
          type: string
        cert_ttl:
          type: string
    IssueSSHCertResponse:
      type: object
      additionalProperties: false
      required: [ok, fingerprint, principal, expires_at, certificate]
      properties:
        ok:
          type: boolean
          enum: [true]
        fingerprint:
          type: string
        principal:
          type: string
        expires_at:
          type: string
        certificate:
          type: string
    SSHKnownHostsResponse:
      type: object
      additionalProperties: false
      required: [ok, host, port, public_key, known_hosts_line]
      properties:
        ok:
          type: boolean
          enum: [true]
        host:
          type: string
        port:
          type: integer
        public_key:
          type: string
        known_hosts_line:
          type: string
